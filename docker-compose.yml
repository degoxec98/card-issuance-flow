services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: io-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: io-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BROKER=kafka:29092
        for topic in io.card.requested.v1 io.cards.issued.v1 io.card.requested.v1.dlq; do
          echo "Creando topic $$topic (si no existe)..."
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BROKER --create --if-not-exists --topic $$topic --partitions 3 --replication-factor 1
        done
        echo "Topics listos:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BROKER --list

  card-issuer:
    build:
      context: .
      dockerfile: card-issuer/Dockerfile
    container_name: io-card-issuer
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: info
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  card-processor:
    build:
      context: .
      dockerfile: card-processor/Dockerfile
    container_name: io-card-processor
    environment:
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: info
    depends_on:
      kafka-init:
        condition: service_completed_successfully
